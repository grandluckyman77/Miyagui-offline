name: Build Miyagui APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    steps:
      - name- name: Checkout code
    uses: actions/checkout@v4
      - name: Move to correct directory
        run: |
        mv miyagui-offline/* .
        mv miyagui-offline/.* . 2>/dev/null || true
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --no-audit --progress=false
      - name: Build with Vite
        run: npm run build
      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 5

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Move to correct directory
        run: |
        mv miyagui-offline/* .
        mv miyagui-offline/.* . 2>/dev/null || true
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android SDK components
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"
      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - name: Install Capacitor dependencies
        run: |
          npm install --no-audit --progress=false
          npm install @capacitor/core @capacitor/android
      - name: Init Capacitor Android
        run: |
          npx cap init miyagui-offline com.miyagui.app --web-dir dist
          npx cap add android
      - name: Sync Capacitor
        run: npx cap sync
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: miyagui-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
